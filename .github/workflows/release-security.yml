name: Release Security Runner

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      ios_ipa_path:
        description: "Path to release IPA artifact"
        required: true
        type: string
      ios_info_plist_path:
        description: "Optional Info.plist path override"
        required: false
        type: string

jobs:
  local-validation:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      APP_ENV: development
      OPENAI_API_KEY: test-openai-key
      EXPO_PUBLIC_SUPABASE_REDIRECT_URL: mode://auth/callback
      MODE_STORAGE_ORPHAN_THRESHOLD: "0"
      MODE_STORAGE_CLEANUP_MAX_HEARTBEAT_AGE_MINUTES: "30"
      MODE_STORAGE_CLEANUP_EXPECTED_INTERVAL_MINUTES: "15"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pytest

      - name: Install Node dependencies
        run: npm ci

      - name: Run local release security runner
        run: npm run release:security -- --local

      - name: Upload release security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-security-local-artifacts
          path: security_artifacts/release/**
          if-no-files-found: ignore

  release-security:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      APP_ENV: production
      STARTUP_GUARD_ENABLED: "true"
      AUTH_PASSWORD_PROXY_ENABLED: "true"
      ACCOUNT_DELETION_ENABLED: "true"
      ACCOUNT_DELETION_CONTRACT_ENFORCED: "true"
      PERSONAL_DATA_INVENTORY_PATH: security/personal_data_inventory.json
      ACCOUNT_DELETION_ACTIVE_SINK_CATEGORIES: file_storage,retrieval_caches,analytics_events
      ACCOUNT_DELETION_DISABLED_SINK_CATEGORIES: vector_indexes,embedding_stores,logs,notification_providers,email_providers,ai_memory_retrieval_systems
      RATE_LIMIT_BACKEND: postgres
      STORAGE_UPLOAD_WINDOW_SECONDS: "180"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
      EXPO_PUBLIC_SUPABASE_REDIRECT_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_REDIRECT_URL }}
      MODE_SECURITY_DATABASE_URL: ${{ secrets.MODE_SECURITY_DATABASE_URL }}
      MODE_IOS_IPA_PATH: ${{ inputs.ios_ipa_path }}
      MODE_IOS_INFO_PLIST_PATH: ${{ inputs.ios_info_plist_path }}
      MODE_STORAGE_ORPHAN_THRESHOLD: ${{ secrets.MODE_STORAGE_ORPHAN_THRESHOLD }}
      MODE_STORAGE_CLEANUP_MAX_HEARTBEAT_AGE_MINUTES: ${{ secrets.MODE_STORAGE_CLEANUP_MAX_HEARTBEAT_AGE_MINUTES }}
      MODE_STORAGE_CLEANUP_EXPECTED_INTERVAL_MINUTES: ${{ secrets.MODE_STORAGE_CLEANUP_EXPECTED_INTERVAL_MINUTES }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pytest

      - name: Install Node dependencies
        run: npm ci

      - name: Run release security runner
        run: npm run release:security

      - name: Upload release security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-security-artifacts
          path: security_artifacts/release/**
          if-no-files-found: ignore
