name: Security Secrets Scan

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install gitleaks
        shell: bash
        run: |
          set -euo pipefail
          VERSION="8.24.3"
          ARCHIVE="gitleaks_${VERSION}_linux_x64.tar.gz"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/${ARCHIVE}" -o "/tmp/${ARCHIVE}"
          tar -xzf "/tmp/${ARCHIVE}" -C /tmp gitleaks
          mkdir -p "${HOME}/.local/bin"
          mv /tmp/gitleaks "${HOME}/.local/bin/gitleaks"
          chmod +x "${HOME}/.local/bin/gitleaks"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Run repository secret scan
        shell: bash
        run: |
          bash scripts/security_scan_secrets.sh
